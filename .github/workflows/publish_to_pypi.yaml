name: Upload Python Package to PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    uses: ./.github/workflows/test.yaml

  # Job 1: Publish to TestPyPI (Runs on push to main)
  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: test
    if: github.repository == 'whywhybug/whywhytools' && github.ref_type == 'branch' # Runs on main branch push or manual trigger on a branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # 👈 Critical: id-token write permission is required for OIDC authentication

    environment:
      name: testpypi
      url: https://test.pypi.org/p/whywhytools

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.10"

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          # Note: password parameter is not needed when using OIDC

  # Job 2: Publish to Real PyPI (Runs only on tags v*)
  publish-to-pypi:
    name: Publish to PyPI
    needs: test
    if: github.repository == 'whywhybug/whywhytools' && startsWith(github.ref, 'refs/tags/v') # Only run on version tags
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # 👈 Critical: id-token write permission is required for OIDC authentication

    environment:
      name: pypi
      url: https://pypi.org/p/whywhytools

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.10"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
